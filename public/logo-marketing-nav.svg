    <line x1="48" y1="0"  x2="48" y2="44" stroke="#0D1520" stroke-width="4.5" stroke-linecap="round"/>
    <line x1="12" y1="10" x2="48" y2="10" stroke="#F04E23" stroke-width="3.5" stroke-linecap="round"/>
