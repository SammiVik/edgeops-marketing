  <text x="72" y="47" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-weight="400" font-size="8.5" fill="rgba(13,21,32,0.4)" letter-spacing="3">SCAFFOLDING OPS. SIMPLIFIED.</text>
